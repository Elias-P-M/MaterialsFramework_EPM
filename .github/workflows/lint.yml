name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

jobs:
  lint:
    name: Run Linter
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version-file: ".python-version"

      - name: Install uv
        uses: astral-sh/setup-uv@v7.3.1
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Run prek
        uses: j178/prek-action@v1.1.1
        with:
          prek-version: '0.3.3'
